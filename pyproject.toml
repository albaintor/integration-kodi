[tool.ruff]
line-length = 120
target-version = "py311"
src = ["src", "tests"]
extend-exclude = ["build", "dist"]

[tool.ruff.lint]
select = [
    "E",      # pycodestyle
    "F",      # pyflakes
    "B",      # bugbear
    "I",      # isort
    "PL",     # pylint
    "UP",     # pyupgrade
    "SIM",    # simplify
    "ASYNC",  # async rules
    "S",      # security
    "C4",     # comprehensions
    "RUF",    # ruff-specific
    "TRY",    # tryceratops
    "PERF",   # perflint
    "DTZ",    # datetimez
    "PTH",    # pathlib
    "RET",    # return rules
    "G",      # logging-format
    "LOG",    # logging
    "PIE",    # flake8-pie
    "A",      # builtins
    "ARG",    # unused arguments
    "BLE",    # blind except
    "ISC",    # implicit string concat
    "FLY",    # flynt
    "FURB",   # refurb
    "RSE",    # raise rules
    "T20",    # print
    "INP",    # namespace packages
    "TCH",    # type-checking
    "EM",     # errmsg
    "SLF",    # self-access
    "TID",    # tidy imports
    "FBT",    # boolean trap
]

ignore = [
    "ISC003",  # conflicts with pyright reportImplicitStringConcatenation
    "PLR0911", # too-many-return-statements
    "PLR0912", # too-many-branches
    "PLR2004", # magic-value-comparison (noisy)
    "PLW0603", # global-statement
    "TRY300",  # try-consider-else
]

[tool.ruff.lint.pydocstyle]
convention = "pep257"

[tool.ruff.lint.per-file-ignores]
"tests/**" = [
    "S101",    # assert is the pytest idiom
    "PLC0415", # local imports are intentional in tests (e.g. purity checks)
    "INP001",  # tests are not a package
]

[tool.ruff.lint.isort]
force-sort-within-sections = true
combine-as-imports = true
split-on-trailing-comma = false
known-first-party = []

[tool.ruff.lint.flake8-tidy-imports.banned-api]
"pytz".msg = "use datetime.timezone instead"

[tool.ruff.lint.flake8-pytest-style]
fixture-parentheses = false
mark-parentheses = false

[tool.ruff.lint.mccabe]
max-complexity = 25

[tool.ruff.format]
line-ending = "auto"
quote-style = "double"

[tool.pyright]
include = ["src"]
exclude = ["**/__pycache__", "build", "dist"]
extraPaths = ["src"]
# Standard venv name. Devs with custom venv names must override in their IDE.
venvPath = "."
venv = ".venv"
pythonVersion = "3.11"
typeCheckingMode = "strict"
reportMissingTypeStubs = false
useLibraryCodeForTypes = true
# Untyped 3rd-party deps (ucapi) trigger Unknown cascades.
reportMissingImports = false
reportUntypedBaseClass = false
reportUnknownVariableType = false
reportUnknownMemberType = false
reportUnknownArgumentType = false
reportUnknownParameterType = false
reportUnknownLambdaType = "error"
reportMissingParameterType = false
reportUnusedVariable = false
reportUntypedFunctionDecorator = false
reportAttributeAccessIssue = false
reportDeprecated = false
reportMissingTypeArgument = false
reportRedeclaration = false
reportGeneralTypeIssues = false
reportIncompatibleMethodOverride = false
reportReturnType = false
reportOptionalMemberAccess = false
reportOptionalSubscript = false
reportOptionalOperand = false
reportOptionalIterable = false
# Module-level state vars use UPPER_CASE by convention. Mutable globals not constants.
reportConstantRedefinition = false
reportPrivateImportUsage = false
reportPrivateUsage = false
reportImplicitOverride = false
reportUnnecessaryComparison = false
reportUnnecessaryTypeIgnoreComment = "error"
reportImplicitStringConcatenation = "error"
deprecateTypingAliases = true
reportUninitializedInstanceVariable = "error"
reportPropertyTypeMismatch = "error"
reportCallInDefaultInitializer = "warning"
